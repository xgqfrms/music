<!DOCTYPE html>
<html lang="zh-Hans">
<head>

  <title>music player</title>
  <style lang="css">
    #btn {
      background-color: #000000; /* Green */
      border: none;
      color: #00ff00;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 23px;
      margin: 4px 2px;
      cursor: pointer;
      border-radius: 20px;
    }
    #btn:hover {
      background-color: #00ff00;
      color: #000000;
    }

    /* 1. 隐藏原生 input */
    #file-upload {
      display: none;
    }
    
    /* 2. 定义 label 容器样式 */
    .custom-file-upload {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-family: sans-serif;
    }
    
    /* 3. 定义“按钮”部分的样式 */
    .custom-file-upload .btn-text {
      display: inline-block;
      padding: 8px 16px;
      background-color: #007bff; /* 蓝色背景 */
      color: white;
      border-radius: 4px;
      font-size: 14px;
      transition: background-color 0.2s ease;
    }
    
    /* 鼠标悬停效果 */
    .custom-file-upload .btn-text:hover {
      background-color: #0056b3;
    }
    
    /* 4. 定义“文件名”展示部分的样式 */
    #file-name {
      display:  none;
    }
  </style>
</head>
<body>
  <header>
    <h1>music player</h1>
  </header>
  <main>
    <section>
        <a href="https://music.777737777.xyz/music-player/index.html">music-player</a>
    </section>
    <section>
      <!-- 隐藏原生 input -->
      <input type="file" id="file-upload" style="display: none;">
      <!-- 自定义显示的内容 -->
      <label for="file-upload" class="custom-file-upload">
        <span class="btn-text">点击上传本地文件</span>
        <span id="file-name">未选择任何本地文件</span>
      </label>

          crossorigin="anonymous"
          id="audio"
          controls
          autoplay
          loop
          onloadstart="this.playbackRate = 1.5; this.volume = 0.5;"
          download="https://music.777737777.xyz/background-music/shake%20and%20sway.mp3"
